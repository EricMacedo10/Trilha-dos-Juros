name: Atualizar Dados Mercado Global (HG Brasil)

on:
  schedule:
    # --- INTELLIGENT BRT (GMT-3) SCHEDULING ---
    
    # 1. Horário de Mercado (Seg-Sex, 09:30 às 18:30 BRT) -> A cada 15 minutos (Real-Time)
    # 12:30 às 21:30 UTC
    - cron: '*/15 12-21 * * 1-5'
    
    # 2. Check-in Fora de Horário (Seg-Sex, 00:00, 06:00, 22:00 BRT) -> 03:00, 09:00, 01:00 UTC
    - cron: '0 1,3,9 * * 1-5'
    
    # 3. Final de Semana (Sáb-Dom, 12:00 BRT) -> 15:00 UTC
    - cron: '0 15 * * 0,6'

  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  update-market:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Market Update Script
        run: python 4_Automacao_IA/update_market_data.py
        # Nota: O script usa a chave cce1a3d7 que já está embutida nele.

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Market Bot"
          git add 3_Front_End/hg.json
          git commit -m "data: auto-update market quotes [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes to commit"
          git push

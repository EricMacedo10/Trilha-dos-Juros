name: Deploy para Producao (Hostinger)

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🚀 Deploy via FTP
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Obter o código mais recente
        uses: actions/checkout@v4

      - name: 📦 Preparar Build de Produção
        run: |
          rm -rf dist
          mkdir dist
          cp -r 3_Front_End/* dist/
          cp -r 4_Back_End/js/* dist/js/ 2>/dev/null || true
          cp 4_Back_End/api_commodities.php dist/ 2>/dev/null || echo "api_commodities.php skip"
          # API_Investimento não é mais enviada para a Hostinger (roda no Gist Strategy)
          [ -f .htaccess ] && cp .htaccess dist/ || echo ".htaccess skip"
          [ -f ads.txt ] && cp ads.txt dist/ || echo "ads.txt skip"
          
          # Normalização de caminhos para produção
          find dist -name "*.html" -exec sed -i 's|\.\./4_Back_End/js|js|g' {} +
          find dist -name "*.html" -exec sed -i 's|4_Back_End/||g' {} +
          
          echo "### Estrutura do diretório de deploy: ###"
          ls -R dist

      - name: 📂 Sincronizar arquivos para Hostinger (Método Robusto LFTP)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -e "
          set sftp:connect-program 'ssh -a -x -p 65002 -o StrictHostKeyChecking=no';
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} sftp://46.202.145.226;
          mirror -R ./dist/ ./;
          quit;
          "

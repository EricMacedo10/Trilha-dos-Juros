name: Deploy para Producao (Hostinger)

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🚀 Deploy via FTP
    runs-on: ubuntu-22.04
    steps:
      - name: 🚚 Obter o código mais recente
        uses: actions/checkout@v4

      - name: 📦 Preparar Build de Produção
        run: |
          mkdir dist
          cp -r 3_Front_End/* dist/
          cp -r 4_Back_End/js dist/js || true
          cp 4_Back_End/api_commodities.php dist/ || echo "api_commodities.php not found"
          cp -r API_Investimento dist/
          [ -f .htaccess ] && cp .htaccess dist/ || echo ".htaccess not found"
          [ -f ads.txt ] && cp ads.txt dist/ || echo "ads.txt not found"
          sed -i 's|\.\./4_Back_End/js|js|g' dist/index.html || echo "sed skip"

      - name: 📂 Sincronizar arquivos para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          local-dir: ./dist/
          dangerous-clean-slate: false
          timeout: 1200000
          protocol: ftps
          port: 21

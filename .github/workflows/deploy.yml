name: Deploy para Producao (Hostinger)

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🚀 Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Obter o código mais recente
        uses: actions/checkout@v3

      - name: 📦 Preparar Build de Produção
        run: |
          mkdir dist
          cp -r 3_Front_End/* dist/
          cp -r 4_Back_End/js dist/js
          cp .htaccess dist/
          cp ads.txt dist/
          sed -i 's|\.\./4_Back_End/js|js|g' dist/index.html

      - name: 📂 Sincronizar arquivos para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./
          local-dir: ./dist/
          dangerous-clean-slate: true
          timeout: 60000
          protocol: ftp


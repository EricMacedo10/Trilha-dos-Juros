name: Radar de Eventos Real-Time (Investing.com)

on:
  schedule:
    # A cada 45 minutos de segunda a sexta
    - cron: '*/45 * * * 1-5'
  workflow_dispatch: # Permite execução manual

jobs:
  update_radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd 4_Automacao_IA
          pip install -r requirements.txt

      - name: Run Radar Engine (Firecrawl + DeepSeek)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cd 4_Automacao_IA
          python radar_engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "EricMacedo10"
          git config --global user.email "ericmacedo10@gmail.com"
          git add 3_Front_End/radar_data.json
          git commit -m "📊 🤖 Auto-update: Radar de Eventos (Real-Time)" || echo "No changes to commit"
          git push

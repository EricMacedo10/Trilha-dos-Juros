name: Radar de Eventos Real-Time (Investing.com)

on:
  schedule:
    # Execução a cada 2 horas, de Segunda a Sexta
    # Horário de Brasília (BRT): 08:00 às 20:00 (11:00 às 23:00 UTC)
    - cron: '0 11-23/2 * * 1-5'
  workflow_dispatch: # Permite execução manual

jobs:
  update_radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd 4_Automacao_IA
          pip install -r requirements.txt

      - name: Run Radar Engine (Firecrawl Extract)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          cd 4_Automacao_IA
          python radar_engine.py
          echo "Status: Radar atualizado."

      - name: Commit and Push Changes
        run: |
          git config --global user.name "EricMacedo10"
          git config --global user.email "ericmacedo10@gmail.com"
          if [ -f 3_Front_End/radar_data.json ]; then
            git add 3_Front_End/radar_data.json
            git commit -m "📊 🤖 Auto-update: Radar de Eventos (Precision Mode)" || echo "No changes to commit"
            git push
          else
            echo "⚠️ radar_data.json não encontrado. Abortando deploy."
            exit 1
          fi

name: Atualizar Cotações de Commodities

on:
  schedule:
    - cron: '0 * * * *' # Executa a cada 1 hora para economizar creditos
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          cd API_Investimento
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Scraper e Publicar no Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          COMMODITY_API_KEY: ${{ secrets.COMMODITY_API_KEY }}
          COMMODITTY_API_KEY: ${{ secrets.COMMODITTY_API_KEY }}
          COMMODITTY_APT_KEY: ${{ secrets.COMMODITTY_APT_KEY }}
          COMMODITY_APT_KEY: ${{ secrets.COMMODITY_APT_KEY }}
          APT_KEY: ${{ secrets.APT_KEY }}
        run: |
          cd API_Investimento
          python scraper.py

      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/
          local-dir: API_Investimento/ # Assuming the files to deploy are in this directory
          # You might want to specify which files to upload, e.g., include: 'API_Investimento/**'
          # or exclude: 'API_Investimento/requirements.txt' etc.
          # For simplicity, deploying the whole API_Investimento directory content.

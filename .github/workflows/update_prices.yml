name: Atualizar Cotações de Commodities

on:
  schedule:
    - cron: '0 * * * *' # Executa a cada 1 hora para economizar creditos
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          cd API_Investimento
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Scraper e Publicar no Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          COMMODITY_API_KEY: ${{ secrets.COMMODITY_API_KEY }}
        run: |
          cd API_Investimento
          python scraper.py
